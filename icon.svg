<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#2d5016"/>
  <rect x="32" y="32" width="448" height="448" rx="72" fill="#4a7c2a"/>
